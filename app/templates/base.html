<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="icon" href="{{ asset('favicon.svg') }}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ asset('favicon.svg') }}">
  <meta name="theme-color" content="#0f1420">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap">
  <link rel="stylesheet" href="{{ asset('style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">🏃 {{ app_name }}</a>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/calendar">Calendario</a>
      <a href="/plans">Piani</a>
      <a href="/health">Salute</a>
      <a href="/form">Forma</a>
      <a href="/routes">Percorsi</a>
      <a href="/conversations">Conversazioni</a>
      <a href="/duplicates">Duplicati</a>
      <a href="/settings">Impostazioni</a>
      <a href="/logout" class="muted">Esci</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
    // highlight the current section in the nav
    (function () {
      const path = location.pathname;
      document.querySelectorAll(".topbar nav a").forEach(a => {
        const href = a.getAttribute("href");
        if (href === path || (href !== "/" && path.startsWith(href))) a.classList.add("active");
        else if (href === "/" && path === "/") a.classList.add("active");
      });
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
