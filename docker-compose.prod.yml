# Variante per il server di casa, dietro reverse proxy / Cloudflare Tunnel.
# Pubblica una porta host (default 8090); il proxy/tunnel instrada verso di essa.
#
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  openfit:
    build: .
    container_name: openfit
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/data/app.db
      - FIT_DIR=/data/fits
    ports:
      - "${HOST_PORT:-8090}:8080"   # reverse proxy / tunnel -> host:PORT
    volumes:
      - data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  data:
    name: openfit_data
